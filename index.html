<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musicfly — Web Player</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="app">
        <!-- ============ SIDEBAR ============ -->
        <aside class="sidebar">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="#1DB954" width="32" height="32" aria-hidden="true">
                    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                </svg>
                <span>Musicfly</span>
            </div>

            <nav class="nav-primary">
                <button class="nav-item active" data-view="home">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12.5 3.247a1 1 0 0 0-1 0L4 7.577V20h4.5v-6a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v6H20V7.577l-7.5-4.33zm-2-1.732a3 3 0 0 1 3 0l7.5 4.33a2 2 0 0 1 1 1.732V21a1 1 0 0 1-1 1h-6.5a1 1 0 0 1-1-1v-6h-3v6a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7.577a2 2 0 0 1 1-1.732l7.5-4.33z"/></svg>
                    <span>Home</span>
                </button>
                <button class="nav-item" data-view="search">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M10.533 1.279c-5.18 0-9.407 4.14-9.407 9.279s4.226 9.279 9.407 9.279c2.234 0 4.29-.77 5.907-2.058l4.353 4.353a1 1 0 1 0 1.414-1.414l-4.344-4.344a9.157 9.157 0 0 0 2.077-5.816c0-5.14-4.226-9.28-9.407-9.28zm-7.407 9.279c0-4.006 3.302-7.279 7.407-7.279s7.407 3.273 7.407 7.279-3.302 7.279-7.407 7.279-7.407-3.273-7.407-7.279z"/></svg>
                    <span>Search</span>
                </button>
            </nav>

            <div class="library">
                <div class="library-header">
                    <button class="library-title">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M14.5 2.134a1 1 0 0 1 1 0l6 3.464a1 1 0 0 1 .5.866V21a1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1V3a1 1 0 0 1 .5-.866zM16 4.732V20h4V7.041l-4-2.309zM3 22a1 1 0 0 1-1-1V3a1 1 0 0 1 2 0v18a1 1 0 0 1-1 1zm6 0a1 1 0 0 1-1-1V3a1 1 0 0 1 2 0v18a1 1 0 0 1-1 1z"/></svg>
                        <span>Your Library</span>
                    </button>
                    <button class="icon-btn" title="Create playlist" id="create-playlist-btn">
                        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M15.25 8a.75.75 0 0 1-.75.75H8.75v5.75a.75.75 0 0 1-1.5 0V8.75H1.5a.75.75 0 0 1 0-1.5h5.75V1.5a.75.75 0 0 1 1.5 0v5.75h5.75a.75.75 0 0 1 .75.75z"/></svg>
                    </button>
                </div>

                <div class="library-chips">
                    <button class="chip active" data-filter="all">All</button>
                    <button class="chip" data-filter="playlists">Playlists</button>
                    <button class="chip" data-filter="artists">Artists</button>
                </div>

                <ul class="library-list" id="library-list">
                    <!-- Populated by JS -->
                </ul>
            </div>
        </aside>

        <!-- ============ MAIN CONTENT ============ -->
        <main class="main">
            <header class="topbar">
                <div class="nav-buttons">
                    <button class="round-btn" title="Go back">
                        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M11.03.47a.75.75 0 0 1 0 1.06L4.56 8l6.47 6.47a.75.75 0 1 1-1.06 1.06L2.44 8 9.97.47a.75.75 0 0 1 1.06 0z"/></svg>
                    </button>
                    <button class="round-btn" title="Go forward">
                        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M4.97.47a.75.75 0 0 0 0 1.06L11.44 8l-6.47 6.47a.75.75 0 1 0 1.06 1.06L13.56 8 6.03.47a.75.75 0 0 0-1.06 0z"/></svg>
                    </button>
                </div>

                <div class="topbar-search" id="topbar-search">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10.533 1.279c-5.18 0-9.407 4.14-9.407 9.279s4.226 9.279 9.407 9.279c2.234 0 4.29-.77 5.907-2.058l4.353 4.353a1 1 0 1 0 1.414-1.414l-4.344-4.344a9.157 9.157 0 0 0 2.077-5.816c0-5.14-4.226-9.28-9.407-9.28zm-7.407 9.279c0-4.006 3.302-7.279 7.407-7.279s7.407 3.273 7.407 7.279-3.302 7.279-7.407 7.279-7.407-3.273-7.407-7.279z"/></svg>
                    <input type="text" placeholder="What do you want to play?" id="search-input" />
                </div>

                <div class="user-area">
                    <button class="pill-btn">Install App</button>
                    <button class="avatar" title="Profile">T</button>
                </div>
            </header>

            <div class="content" id="content">
                <!-- ============ HOME VIEW ============ -->
                <section class="view view-home active" data-view="home">
                    <div class="hero">
                        <h1 class="greeting" id="greeting">Good evening</h1>
                        <div class="quick-grid" id="quick-grid">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <section class="row">
                        <div class="row-header">
                            <h2>Made for you</h2>
                            <a href="#" class="show-all">Show all</a>
                        </div>
                        <div class="card-grid" id="made-for-you">
                            <!-- Populated by JS -->
                        </div>
                    </section>

                    <section class="row">
                        <div class="row-header">
                            <h2>Your top songs</h2>
                            <a href="#" class="show-all">Show all</a>
                        </div>
                        <div class="card-grid" id="top-songs">
                            <!-- Populated by JS -->
                        </div>
                    </section>
                </section>

                <!-- ============ SEARCH VIEW ============ -->
                <section class="view view-search" data-view="search">
                    <div class="search-results-header" id="search-results-header"></div>
                    <div class="search-results" id="search-results"></div>
                    <div class="browse" id="browse">
                        <h2>Browse all</h2>
                        <div class="genre-grid" id="genre-grid"></div>
                    </div>
                </section>

                <!-- ============ PLAYLIST VIEW ============ -->
                <section class="view view-playlist" data-view="playlist">
                    <header class="playlist-header" id="playlist-header"></header>
                    <div class="playlist-actions">
                        <button class="play-large" id="play-playlist">
                            <svg viewBox="0 0 16 16" width="24" height="24" fill="#000"><path d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288V1.713z"/></svg>
                        </button>
                        <button class="icon-btn-lg" title="More">
                            <svg viewBox="0 0 16 16" width="24" height="24" fill="currentColor"><path d="M3 8a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm6.5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM14.5 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/></svg>
                        </button>
                    </div>
                    <div class="track-table" id="track-table"></div>
                </section>
            </div>
        </main>

        <!-- ============ NOW PLAYING BAR ============ -->
        <footer class="player">
            <div class="player-track">
                <div class="track-art" id="player-art"></div>
                <div class="track-info">
                    <div class="track-title" id="player-title">Select a song</div>
                    <div class="track-artist" id="player-artist">—</div>
                </div>
                <button class="icon-btn like-btn" id="like-btn" title="Save to Your Library">
                    <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M1.69 2A4.582 4.582 0 0 1 8 2.023 4.583 4.583 0 0 1 11.464.5h.014a4.56 4.56 0 0 1 3.214 1.314 4.572 4.572 0 0 1 .144 6.435L8 15.193l-6.812-6.89A4.57 4.57 0 0 1 1.69 2zm9.78.5h-.014a3.071 3.071 0 0 0-2.448 1.225l-.61.799-.61-.799A3.072 3.072 0 0 0 5.34 2.5H5.33a3.075 3.075 0 0 0-2.157.844 3.072 3.072 0 0 0-.097 4.32L8 13.046l4.92-5.38a3.072 3.072 0 0 0-.097-4.323 3.076 3.076 0 0 0-2.157-.844z"/></svg>
                </button>
            </div>

            <div class="player-controls">
                <div class="control-buttons">
                    <button class="control-btn" id="shuffle-btn" title="Shuffle">
                        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M13.151.922a.75.75 0 1 0-1.06 1.06L13.109 3H11.16a3.75 3.75 0 0 0-2.873 1.34l-6.173 7.356A2.25 2.25 0 0 1 .39 12.5H0V14h.39a3.75 3.75 0 0 0 2.873-1.34l6.173-7.356a2.25 2.25 0 0 1 1.724-.804h1.947l-1.017 1.018a.75.75 0 0 0 1.06 1.06L15.98 3.75 13.15.922zM.391 3.5H0V2h.391c1.109 0 2.16.49 2.873 1.34L4.89 5.277l-.979 1.167-1.796-2.14A2.25 2.25 0 0 0 .39 3.5z"/><path d="m7.5 10.723.98-1.167.957 1.14a2.25 2.25 0 0 0 1.724.804h1.947l-1.017-1.018a.75.75 0 1 1 1.06-1.06l2.829 2.828-2.829 2.828a.75.75 0 1 1-1.06-1.06L13.109 13H11.16a3.75 3.75 0 0 1-2.873-1.34l-.787-.938z"/></svg>
                    </button>
                    <button class="control-btn" id="prev-btn" title="Previous">
                        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M3.3 1a.7.7 0 0 1 .7.7v5.15l9.95-5.744a.7.7 0 0 1 1.05.606v12.575a.7.7 0 0 1-1.05.607L4 9.149V14.3a.7.7 0 0 1-.7.7H1.7a.7.7 0 0 1-.7-.7V1.7a.7.7 0 0 1 .7-.7h1.6z"/></svg>
                    </button>
                    <button class="control-btn play-btn" id="play-btn" title="Play">
                        <svg viewBox="0 0 16 16" width="20" height="20" fill="#000" id="play-icon"><path d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288V1.713z"/></svg>
                    </button>
                    <button class="control-btn" id="next-btn" title="Next">
                        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M12.7 1a.7.7 0 0 0-.7.7v5.15L2.05 1.107A.7.7 0 0 0 1 1.712v12.575a.7.7 0 0 0 1.05.607L12 9.149V14.3a.7.7 0 0 0 .7.7h1.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7h-1.6z"/></svg>
                    </button>
                    <button class="control-btn" id="repeat-btn" title="Repeat">
                        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M0 4.75A3.75 3.75 0 0 1 3.75 1h8.5A3.75 3.75 0 0 1 16 4.75v5a3.75 3.75 0 0 1-3.75 3.75H9.81l1.018 1.018a.75.75 0 1 1-1.06 1.06L6.939 12.75l2.829-2.828a.75.75 0 1 1 1.06 1.06L9.811 12h2.439a2.25 2.25 0 0 0 2.25-2.25v-5a2.25 2.25 0 0 0-2.25-2.25h-8.5A2.25 2.25 0 0 0 1.5 4.75v5A2.25 2.25 0 0 0 3.75 12H5v1.5H3.75A3.75 3.75 0 0 1 0 9.75v-5z"/></svg>
                    </button>
                </div>
                <div class="progress-row">
                    <span class="time" id="current-time">0:00</span>
                    <div class="progress-bar" id="progress-bar">
                        <div class="progress-track">
                            <div class="progress-fill" id="progress-fill"></div>
                            <div class="progress-thumb" id="progress-thumb"></div>
                        </div>
                    </div>
                    <span class="time" id="duration">0:00</span>
                </div>
            </div>

            <div class="player-extras">
                <button class="control-btn" title="Now playing view">
                    <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M11.196 8 6 5v6l5.196-3z"/><path d="M15.002 1.75A1.75 1.75 0 0 0 13.252 0h-10.5a1.75 1.75 0 0 0-1.75 1.75v12.5c0 .966.783 1.75 1.75 1.75h10.5a1.75 1.75 0 0 0 1.75-1.75V1.75zm-1.75-.25a.25.25 0 0 1 .25.25v12.5a.25.25 0 0 1-.25.25h-10.5a.25.25 0 0 1-.25-.25V1.75a.25.25 0 0 1 .25-.25h10.5z"/></svg>
                </button>
                <button class="control-btn" title="Queue">
                    <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M15 15H1v-1.5h14V15zm0-4.5H1V9h14v1.5zM1.75 6a.75.75 0 0 1-.75-.75v-3.5a.75.75 0 0 1 1.234-.575l2.875 2.4a.75.75 0 0 1-.39 1.32l-.336.046a.75.75 0 0 1-.62-.21L1.75 6zm5.75-.75A.75.75 0 0 1 8.25 4.5h6.5a.75.75 0 0 1 0 1.5h-6.5a.75.75 0 0 1-.75-.75z"/></svg>
                </button>
                <div class="volume">
                    <button class="control-btn" id="volume-btn" title="Mute">
                        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" id="volume-icon"><path d="M9.741.85a.75.75 0 0 1 .375.65v13a.75.75 0 0 1-1.125.65l-6.925-4a3.642 3.642 0 0 1-1.33-4.967 3.639 3.639 0 0 1 1.33-1.332l6.925-4a.75.75 0 0 1 .75 0zm-6.924 5.3a2.139 2.139 0 0 0 0 3.7l5.8 3.35V2.8l-5.8 3.35zm8.683 4.29V5.56a2.75 2.75 0 0 1 0 4.88z"/><path d="M11.5 13.614a5.752 5.752 0 0 0 0-11.228v1.55a4.252 4.252 0 0 1 0 8.127v1.55z"/></svg>
                    </button>
                    <div class="volume-bar" id="volume-bar">
                        <div class="volume-track">
                            <div class="volume-fill" id="volume-fill"></div>
                            <div class="volume-thumb" id="volume-thumb"></div>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <div class="playback-toast hidden" id="playback-toast" role="alert"></div>
    <audio id="audio" preload="auto" playsinline></audio>
    <script src="app.js"></script>
</body>
</html>
